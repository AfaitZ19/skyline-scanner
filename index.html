<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Skyline Stock</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
body{font-family:sans-serif;background:#f5f7fb;margin:0}
.container{max-width:600px;margin:auto;padding:16px}
.card{background:#fff;border-radius:10px;padding:14px;margin-bottom:12px;box-shadow:0 2px 6px rgba(0,0,0,.08)}
button{padding:10px;border:none;border-radius:8px;font-weight:bold;cursor:pointer}
.primary{background:#1a4fa0;color:#fff}
.danger{background:#b92e2e;color:#fff}
input,select{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;margin-bottom:10px}
#reader{width:100%;margin-top:10px}
</style>
</head>

<body>
<div class="container">

<div class="card">
<h3>🔗 เชื่อม API</h3>
<input id="api" placeholder="Apps Script URL">
<input id="user" placeholder="User">
<input id="pass" type="password" placeholder="Password">
<button class="primary" onclick="login()">เข้า</button>
</div>

<div class="card">
<h3>📷 Scan</h3>
<button onclick="startScan()">เปิดกล้อง</button>
<div id="reader"></div>
</div>

<div class="card">
<h3>📦 Result</h3>
<pre id="out"></pre>

<select id="type">
<option value="device">device</option>
<option value="mask">mask</option>
<option value="accessory">accessory</option>
</select>

<input id="loc" placeholder="location / sale">
<input id="note" placeholder="note">

<button class="primary" onclick="send('in')">รับเข้า</button>
<button class="danger" onclick="send('out')">จ่ายออก</button>
</div>

</div>

<script>
let API='',USER='',LAST=null,scanner=null;

/* ========================
   LOGIN
======================== */
function login(){
  API=document.getElementById('api').value.trim();
  USER=document.getElementById('user').value.trim();
  alert('connected');
}

/* ========================
   GS1 PARSER (ตัวเทพ)
======================== */
function parseGS1(str){
  let res={gtin:'',lot:'',sn:'',mfg:'',exp:''};

  let i=0;
  while(i<str.length){
    if(str[i]!=='('){i++;continue;}
    let j=str.indexOf(')',i);
    if(j<0)break;

    let ai=str.slice(i+1,j);
    let valStart=j+1;
    let next=str.indexOf('(',valStart);
    let val=next<0?str.slice(valStart):str.slice(valStart,next);

    if(ai==='01')res.gtin=val;
    if(ai==='10')res.lot=val;
    if(ai==='21')res.sn=val;
    if(ai==='11')res.mfg=fmtDate(val);
    if(ai==='17')res.exp=fmtDate(val);

    i=valStart+val.length;
  }
  return res;
}

function fmtDate(s){
  if(!/^\d{6}$/.test(s))return s;
  let y=parseInt(s.slice(0,2));
  let year=y>50?'19'+s.slice(0,2):'20'+s.slice(0,2);
  return `${year}-${s.slice(2,4)}-${s.slice(4,6)}`;
}

/* ========================
   SIZE จาก LOT
======================== */
function getSize(lot){
  let m=lot.match(/NM\d([SML])/i);
  return m?m[1].toUpperCase():'';
}

/* ========================
   PARSE CODE (ตัวจบ)
======================== */
function parse(raw){
  let txt=raw.replace(/\s+/g,'').toUpperCase();

  let d=parseGS1(txt);

  if(!d.gtin){
    let m=txt.match(/01(\d{14})/);
    if(m)d.gtin=m[1];
  }

  if(!d.lot){
    let i=txt.indexOf('10');
    if(i!==-1)d.lot=txt.slice(i+2);
  }

  if(!d.sn){
    let i=txt.indexOf('21');
    if(i!==-1)d.sn=txt.slice(i+2);
  }

  let size=getSize(d.lot);

  LAST={
    raw:txt,
    gtin:d.gtin,
    lot:d.lot,
    sn:d.sn,
    mfg:d.mfg,
    exp:d.exp,
    size:size
  };

  document.getElementById('out').textContent=JSON.stringify(LAST,null,2);
}

/* ========================
   SCANNER
======================== */
async function startScan(){
  scanner=new Html5Qrcode("reader");
  await scanner.start(
    {facingMode:"environment"},
    {fps:10},
    txt=>parse(txt)
  );
}

/* ========================
   SEND
======================== */
async function send(act){
  if(!LAST)return alert('no data');

  let payload={
    action:act,
    type:document.getElementById('type').value,
    gtin:LAST.gtin,
    lot:LAST.lot,
    sn:LAST.sn,
    mfgDate:LAST.mfg,
    expiry:LAST.exp,
    size:LAST.size,
    location:document.getElementById('loc').value,
    note:document.getElementById('note').value,
    user:USER
  };

  let r=await fetch(API,{
    method:'POST',
    body:JSON.stringify(payload)
  });

  let t=await r.text();
  alert(t);
}
</script>

</body>
</html>
