<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skyline Scanner PRO</title>

<!-- โหลด ZXing แบบเสถียร -->
<script src="https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.5/umd/index.min.js"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  padding: 20px;
  background: #f5f7fa;
}
video {
  width: 100%;
  max-width: 400px;
  border-radius: 12px;
  margin-top: 20px;
}
button {
  padding: 14px 20px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
  background: #1a4fa0;
  color: white;
  margin: 10px;
}
</style>
</head>

<body>

<h2>📦 Skyline Scanner PRO</h2>

<button onclick="startScan()">📷 เปิดกล้อง</button>
<button onclick="stopScan()">⛔ หยุด</button>

<video id="video" autoplay muted playsinline></video>

<script>
let codeReader = null;
let controls = null;

async function startScan() {

  // 🔥 เช็ค ZXing ก่อน
  if (typeof ZXing === "undefined") {
    alert("❌ ZXing โหลดไม่เข้า (ลอง refresh ใหม่)");
    return;
  }

  if (codeReader) return;

  try {
    codeReader = new ZXing.BrowserMultiFormatReader();

    const devices = await ZXing.BrowserCodeReader.listVideoInputDevices();

    if (!devices.length) {
      alert("❌ ไม่พบกล้อง");
      return;
    }

    const deviceId = devices[devices.length - 1].deviceId;

    controls = await codeReader.decodeFromVideoDevice(
      deviceId,
      'video',
      (result, err) => {
        if (result) {
          const text = result.getText();

          navigator.vibrate && navigator.vibrate(100);

          alert("✅ สแกนได้:\n" + text);

          fetch("https://script.google.com/macros/s/AKfycbwXPMj_QZdNFbKSaL69xqXoH7iXVaZeO5hRgWMTbYoSXm1T-AYMrvajOAPtt9evg40sfA/exec", {
            method: "POST",
            headers: {
              "Content-Type": "text/plain;charset=utf-8"
            },
            body: JSON.stringify({
              action: "in",
              sn: text
            })
          });
        }
      }
    );

  } catch (err) {
    alert("❌ เปิดกล้องไม่ได้:\n" + err);
    console.log(err);
  }
}

function stopScan() {
  if (controls) {
    controls.stop();
    codeReader = null;
  }
}
</script>

</body>
</html>
