<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skyline Scanner PRO</title>

<script src="https://unpkg.com/@zxing/browser@0.1.1"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  padding: 20px;
  background: #f5f7fa;
}
video {
  width: 100%;
  max-width: 400px;
  border-radius: 12px;
  margin-top: 20px;
}
button {
  padding: 14px 20px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
  background: #1a4fa0;
  color: white;
  margin: 10px;
}
</style>
</head>

<body>

<h2>📦 Skyline Scanner PRO</h2>

<button onclick="startScan()">📷 เปิดกล้อง</button>
<button onclick="stopScan()">⛔ หยุด</button>

<video id="video"></video>

<script>
let codeReader;
let controls;

async function startScan() {
  if (codeReader) return;

  codeReader = new ZXing.BrowserMultiFormatReader();

  try {
    controls = await codeReader.decodeFromVideoDevice(
      null,
      'video',
      (result, err) => {
        if (result) {
          const text = result.getText();

          navigator.vibrate && navigator.vibrate(100);

          alert("สแกนได้:\n" + text);

          // ยิงเข้า Apps Script
          fetch("https://script.google.com/macros/s/AKfycbwXPMj_QZdNFbKSaL69xqXoH7iXVaZeO5hRgWMTbYoSXm1T-AYMrvajOAPtt9evg40sfA/exec", {
            method: "POST",
            headers: {
              "Content-Type": "text/plain;charset=utf-8"
            },
            body: JSON.stringify({
              action: "in",
              type: "device",
              name: "Auto Scan",
              brand: "Auto",
              model: "Auto",
              sn: text,
              location: "คลัง",
              note: "scan pro"
            })
          });
        }
      }
    );
  } catch (err) {
    alert("เปิดกล้องไม่ได้: " + err);
  }
}

function stopScan() {
  if (controls) {
    controls.stop();
    codeReader = null;
  }
}
</script>

</body>
</html>
