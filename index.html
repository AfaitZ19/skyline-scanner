<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skyline Scanner GTIN</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    body{
      font-family: Arial, sans-serif;
      text-align:center;
      background:#f5f7fa;
      padding:20px;
      margin:0;
      color:#111;
    }
    h1{
      font-size:28px;
      margin:16px 0 18px;
    }
    .btn{
      background:#123f8c;
      color:#fff;
      border:none;
      border-radius:14px;
      padding:14px 22px;
      font-size:18px;
      margin:8px;
      cursor:pointer;
    }
    #reader{
      width:100%;
      max-width:420px;
      margin:20px auto;
      background:#fff;
      border-radius:16px;
      overflow:hidden;
      box-shadow:0 2px 10px rgba(0,0,0,.08);
    }
    #result{
      max-width:420px;
      margin:16px auto 0;
      background:#fff;
      border-radius:14px;
      padding:16px;
      text-align:left;
      word-break:break-word;
      box-shadow:0 2px 10px rgba(0,0,0,.08);
      font-size:16px;
      line-height:1.6;
    }
    .ok{color:#0a7a35;font-weight:bold;}
    .err{color:#b00020;font-weight:bold;}
    .warn{color:#a06a00;font-weight:bold;}
    .muted{color:#666;font-size:13px;}
    .row{margin-bottom:4px;}
  </style>
</head>
<body>

  <h1>📦 Skyline Scanner GTIN</h1>

  <button class="btn" onclick="startScan()">📷 เปิดกล้อง</button>
  <button class="btn" onclick="stopScan()">⛔ หยุด</button>

  <div id="reader"></div>
  <div id="result">รอการสแกน...</div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwXPMj_QZdNFbKSaL69xqXoH7iXVaZeO5hRgWMTbYoSXm1T-AYMrvajOAPtt9evg40sfA/exec";

    // ===== ฐานข้อมูล GTIN =====
    // เพิ่มของจริงของมึงเข้าไปเรื่อย ๆ ตรงนี้
    const PRODUCT_DB = {
      "04719893347081": {
        type: "device",
        name: "APEX iX Auto + Humidifier",
        brand: "APEX Medical",
        model: "iX Auto + Humidifier"
      },
      "04713025000400": {
        type: "device",
        name: "APEX iX Auto",
        brand: "APEX Medical",
        model: "iX Auto"
      },
      "04713025000226": {
        type: "device",
        name: "APEX iX Auto Humidifier",
        brand: "APEX Medical",
        model: "iX Auto Humidifier"
      },
      "04713025000073": {
        type: "device",
        name: "APEX XT Auto",
        brand: "APEX Medical",
        model: "XT Auto"
      },
      "04719893347319": {
        type: "mask",
        name: "WiZARD 510 Nasal Mask",
        brand: "Wellell",
        model: "WiZARD 510"
      },
      "00606959006829": {
        type: "mask",
        name: "Philips Wisp Mask Fabric",
        brand: "Philips Respironics",
        model: "Wisp"
      },
      "06958949938318": {
        type: "mask",
        name: "Beyond EaseFit NM5",
        brand: "Hunan Beyond",
        model: "EaseFit NM5"
      }
    };

    let scanner = null;
    let lastText = "";
    let lastScanAt = 0;
    let isProcessing = false;
    const DUPLICATE_WINDOW_MS = 8000;

    function setResult(html) {
      document.getElementById("result").innerHTML = html;
    }

    function escapeHtml(str) {
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function cleanScanText(text) {
      if (!text) return "";
      return String(text)
        .replace(/[^\x20-\x7E]/g, "")
        .replace(/\s+/g, "")
        .trim()
        .toUpperCase();
    }

    function parseGS1(raw) {
      const txt = cleanScanText(raw);
      const out = {
        raw: txt,
        gtin: "",
        lot: "",
        sn: "",
        mfgDate: ""
      };

      if (!txt) return out;

      // รองรับกรณีสแกนได้เป็น GS1 string เช่น 01069589499383181125062410BY...
      if (txt.startsWith("01") && txt.length >= 16) {
        const maybeGTIN = txt.slice(2, 16);
        if (/^\d{14}$/.test(maybeGTIN)) out.gtin = maybeGTIN;
      }

      const idx11 = txt.indexOf("11");
      if (idx11 !== -1 && txt.length >= idx11 + 8) {
        const d = txt.slice(idx11 + 2, idx11 + 8);
        if (/^\d{6}$/.test(d)) {
          out.mfgDate = "20" + d.slice(0,2) + "-" + d.slice(2,4) + "-" + d.slice(4,6);
        }
      }

      const idx21 = txt.indexOf("21");
      const idx10 = txt.indexOf("10");

      if (idx21 !== -1 && idx10 !== -1 && idx21 < idx10) {
        out.sn = txt.slice(idx21 + 2, idx10);
      } else if (idx21 !== -1) {
        out.sn = txt.slice(idx21 + 2);
      }

      if (idx10 !== -1) {
        out.lot = txt.slice(idx10 + 2);
      }

      // ถ้าสแกนเป็น GTIN ตรง ๆ 14 หลัก
      if (!out.gtin && /^\d{14}$/.test(txt)) {
        out.gtin = txt;
      }

      // ถ้าไม่ใช่ GS1 แต่อาจเป็น serial ตรง ๆ
      if (!out.sn && /^[A-Z0-9-]{6,}$/.test(txt) && !txt.startsWith("01")) {
        out.sn = txt;
      }

      return out;
    }

    function lookupByGTIN(gtin) {
      if (!gtin) return null;
      return PRODUCT_DB[gtin] || null;
    }

    function fallbackProduct(cleaned) {
      // fallback ชั่วคราว เฉพาะกรณีไม่มี GTIN แต่ยังอยากให้บางตัวเข้าได้
      if (cleaned.includes("CADL") || cleaned.includes("R20") || cleaned.includes("R-20I")) {
        return {
          type: "device",
          name: "Beyond R-20i BPAP",
          brand: "Hunan Beyond",
          model: "R-20i"
        };
      }

      if (cleaned.includes("NM5")) {
        return {
          type: "mask",
          name: "Beyond EaseFit NM5",
          brand: "Hunan Beyond",
          model: "EaseFit NM5"
        };
      }

      return null;
    }

    function buildPayload(decodedText) {
      const cleaned = cleanScanText(decodedText);
      const gs1 = parseGS1(cleaned);

      let product = lookupByGTIN(gs1.gtin);

      if (!product) {
        product = fallbackProduct(cleaned);
      }

      if (!product) {
        return {
          error: "UNKNOWN_GTIN",
          cleaned,
          gs1
        };
      }

      const payload = {
        action: "in",
        type: product.type,
        name: product.name,
        brand: product.brand,
        model: product.model,
        sn: "",
        lot: "",
        gtin: gs1.gtin || "",
        mfgDate: gs1.mfgDate || "",
        expiry: "",
        location: "scan",
        user: "github-scanner",
        note: cleaned
      };

      if (product.type === "device") {
        payload.sn = gs1.sn || cleaned;
        payload.lot = gs1.lot || "";
      } else {
        payload.lot = gs1.lot || cleaned;
      }

      return {
        payload,
        gs1,
        product,
        cleaned
      };
    }

    async function sendToSheet(decodedText) {
      const built = buildPayload(decodedText);

      if (built.error === "UNKNOWN_GTIN") {
        setResult(
          '<div class="warn">ไม่รู้จักสินค้า</div>' +
          '<div class="row"><b>Raw:</b> ' + escapeHtml(built.cleaned) + '</div>' +
          '<div class="row"><b>GTIN:</b> ' + escapeHtml(built.gs1.gtin || "-") + '</div>' +
          '<div class="row"><b>SN:</b> ' + escapeHtml(built.gs1.sn || "-") + '</div>' +
          '<div class="row"><b>LOT:</b> ' + escapeHtml(built.gs1.lot || "-") + '</div>' +
          '<div class="row"><b>MFG:</b> ' + escapeHtml(built.gs1.mfgDate || "-") + '</div>' +
          '<hr>' +
          '<div class="muted">เพิ่ม GTIN นี้เข้า PRODUCT_DB ก่อน แล้วค่อยสแกนใหม่</div>'
        );
        return;
      }

      const { payload, gs1, product, cleaned } = built;

      const res = await fetch(API_URL, {
        method: "POST",
        headers: {
          "Content-Type": "text/plain;charset=utf-8"
        },
        body: JSON.stringify(payload)
      });

      const txt = await res.text();

      setResult(
        '<div class="ok">สแกนได้สำเร็จ</div>' +
        '<div class="row"><b>Raw:</b> ' + escapeHtml(cleaned) + '</div>' +
        '<div class="row"><b>ประเภท:</b> ' + escapeHtml(product.type) + '</div>' +
        '<div class="row"><b>ชื่อ:</b> ' + escapeHtml(product.name) + '</div>' +
        '<div class="row"><b>แบรนด์:</b> ' + escapeHtml(product.brand) + '</div>' +
        '<div class="row"><b>รุ่น:</b> ' + escapeHtml(product.model) + '</div>' +
        '<div class="row"><b>GTIN:</b> ' + escapeHtml(gs1.gtin || "-") + '</div>' +
        '<div class="row"><b>SN:</b> ' + escapeHtml(payload.sn || "-") + '</div>' +
        '<div class="row"><b>LOT:</b> ' + escapeHtml(payload.lot || "-") + '</div>' +
        '<div class="row"><b>MFG:</b> ' + escapeHtml(gs1.mfgDate || "-") + '</div>' +
        '<hr>' +
        '<div>ส่งเข้า Apps Script แล้ว</div>' +
        '<div class="muted">' + escapeHtml(txt) + '</div>' +
        '<div style="margin-top:10px;color:#0a7a35;"><b>กด "เปิดกล้อง" เพื่อสแกนชิ้นถัดไป</b></div>'
      );
    }

    async function handleDecoded(decodedText) {
      const cleaned = cleanScanText(decodedText);
      if (!cleaned) return;

      const now = Date.now();

      if (isProcessing) return;
      if (cleaned === lastText && (now - lastScanAt) < DUPLICATE_WINDOW_MS) return;

      isProcessing = true;
      lastText = cleaned;
      lastScanAt = now;

      try {
        if (navigator.vibrate) navigator.vibrate(100);

        if (scanner) {
          try {
            await scanner.stop();
            await scanner.clear();
          } catch (e) {}
          scanner = null;
        }

        setResult('<div class="ok">กำลังตรวจ GTIN...</div><br>' + escapeHtml(cleaned));
        await sendToSheet(cleaned);

      } catch (e) {
        setResult(
          '<div class="err">สแกนได้ แต่ส่งเข้า Apps Script ไม่สำเร็จ</div>' +
          '<div class="row"><b>Raw:</b> ' + escapeHtml(cleaned) + '</div>' +
          '<hr>' +
          '<div class="muted">' + escapeHtml(e) + '</div>'
        );
      } finally {
        isProcessing = false;
      }
    }

    async function startScan() {
      if (scanner || isProcessing) return;

      scanner = new Html5Qrcode("reader");

      try {
        await scanner.start(
          { facingMode: "environment" },
          {
            fps: 10,
            qrbox: { width: 280, height: 280 },
            rememberLastUsedCamera: true,
            aspectRatio: 1.0
          },
          async function(decodedText) {
            await handleDecoded(decodedText);
          },
          function() {}
        );
      } catch (err) {
        setResult('<div class="err">เปิดกล้องไม่ได้</div><br>' + escapeHtml(err));
        scanner = null;
      }
    }

    async function stopScan() {
      if (!scanner) return;
      try {
        await scanner.stop();
        await scanner.clear();
      } catch (e) {}
      scanner = null;
      setResult("หยุดกล้องแล้ว");
    }
  </script>
</body>
</html>
