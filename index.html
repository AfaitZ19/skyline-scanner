<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skyline Scanner FINAL</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  padding: 20px;
  background: #f5f7fa;
}
#reader {
  width: 100%;
  max-width: 400px;
  margin: auto;
}
button {
  padding: 14px 20px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
  background: #1a4fa0;
  color: white;
  margin: 10px;
}
</style>
</head>

<body>

<h2>📦 Skyline Scanner FINAL</h2>

<button onclick="startScan()">📷 เปิดกล้อง</button>
<button onclick="stopScan()">⛔ หยุด</button>

<div id="reader"></div>

<script>
let scanner = null;

function startScan() {
  if (scanner) return;

  scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    {
      fps: 15,
      qrbox: { width: 320, height: 120 }, // 🔥 สำหรับ barcode
      formatsToSupport: [
        Html5QrcodeSupportedFormats.CODE_128,
        Html5QrcodeSupportedFormats.CODE_39,
        Html5QrcodeSupportedFormats.EAN_13,
        Html5QrcodeSupportedFormats.EAN_8,
        Html5QrcodeSupportedFormats.UPC_A,
        Html5QrcodeSupportedFormats.UPC_E,
        Html5QrcodeSupportedFormats.ITF,
        Html5QrcodeSupportedFormats.QR_CODE
      ]
    },
    (text) => {
      navigator.vibrate && navigator.vibrate(100);

      alert("✅ สแกนได้:\n" + text);

      fetch("https://script.google.com/macros/s/AKfycbwXPMj_QZdNFbKSaL69xqXoH7iXVaZeO5hRgWMTbYoSXm1T-AYMrvajOAPtt9evg40sfA/exec", {
        method: "POST",
        headers: {
          "Content-Type": "text/plain;charset=utf-8"
        },
        body: JSON.stringify({
          action: "in",
          sn: text
        })
      });
    },
    (err) => {}
  ).catch(err => {
    alert("❌ เปิดกล้องไม่ได้:\n" + err);
  });
}

function stopScan() {
  if (scanner) {
    scanner.stop().then(() => {
      scanner = null;
    });
  }
}
</script>

</body>
</html>
